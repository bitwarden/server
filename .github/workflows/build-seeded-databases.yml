name: Build Seeded Database Images

on:
  push:
    branches: [feat/seeder-build-pipeline]
    paths:
      - .github/workflows/build-seeded-databases.yml
      - util/SeederUtility/**
      - util/Seeder/**
  workflow_dispatch:
    inputs:
      preset:
        description: "Preset name to build"
        required: false
        type: string
      database:
        description: "Database type to build"
        required: false
        type: choice
        options:
          - ""
          - postgres
          - mysql
          - mariadb
          - mssql

env:
  _AZ_REGISTRY: bitwardenprod.azurecr.io

jobs:
  setup:
    name: Determine build matrix
    runs-on: ubuntu-22.04
    outputs:
      presets: ${{ steps.matrix.outputs.presets }}
      databases: ${{ steps.matrix.outputs.databases }}
    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v4.1.0
        with:
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore and build SeederUtility
        run: |
          dotnet restore util/SeederUtility/SeederUtility.csproj
          dotnet build util/SeederUtility/SeederUtility.csproj --no-restore

      - name: Determine matrix
        id: matrix
        working-directory: util/SeederUtility
        run: |
          if [[ -n "${{ inputs.preset }}" ]]; then
            presets='["${{ inputs.preset }}"]'
          else
            presets='["qa.dunder-mifflin-enterprise-full"]'
          fi

          if [[ -n "${{ inputs.database }}" ]]; then
            databases='["${{ inputs.database }}"]'
          else
            databases='["postgres","mysql","mssql"]'
          fi

          echo "presets=${presets}" >> "$GITHUB_OUTPUT"
          echo "databases=${databases}" >> "$GITHUB_OUTPUT"
          echo "Preset matrix:   ${presets}"
          echo "Database matrix: ${databases}"

  build:
    name: ${{ matrix.database }} / ${{ matrix.preset }}
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        preset: ${{ fromJson(needs.setup.outputs.presets) }}
        database: ${{ fromJson(needs.setup.outputs.databases) }}
      fail-fast: false

    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v4.1.0
        with:
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.7.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.1.0

      - name: Restore .NET local tools
        run: dotnet tool restore

      - name: Build seeded image
        env:
          PUSH: "false"
          REGISTRY: ${{ env._AZ_REGISTRY }}
          GIT_SHA: ${{ github.sha }}
        run: |
          GIT_SHA="${GIT_SHA:0:7}" \
          bash util/SeederUtility/scripts/build-seeded-image.sh \
            "${{ matrix.preset }}" \
            "${{ matrix.database }}"

      - name: Save image as tarball
        run: |
          TAG="${{ matrix.preset }}"
          TAG="${TAG//./-}"
          DB="${{ matrix.database }}"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          docker save \
            "${{ env._AZ_REGISTRY }}/shot/seeded-${DB}:${TAG}" \
            "${{ env._AZ_REGISTRY }}/shot/seeded-${DB}:${TAG}-${SHA_SHORT}" \
            -o "seeded-${DB}-${TAG}-${SHA_SHORT}.tar"

      - name: Upload image artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: seeded-${{ matrix.database }}-${{ matrix.preset }}
          path: seeded-*.tar
          retention-days: 7
          if-no-files-found: error

      - name: Job summary
        if: always()
        run: |
          TAG="${{ matrix.preset }}"
          TAG="${TAG//./-}"
          DB="${{ matrix.database }}"
          SHA="${{ github.sha }}"
          echo "### ${DB} / ${{ matrix.preset }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Built (not pushed): \`${{ env._AZ_REGISTRY }}/shot/seeded-${DB}:${TAG}-${SHA:0:7}\`" \
            >> "$GITHUB_STEP_SUMMARY"
